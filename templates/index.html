<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Attendance Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="referrer" content="no-referrer">
</head>
<body class="bg-light">

<header class="header-dashboard"
    style="display:flex;justify-content:space-between;align-items:center;width:100%;position:relative;">

    <div class="hamburger-dashboard" id="hamburger"
        style="display:flex;align-items:center;gap:10px;cursor:pointer;">
        ☰
        <a href="{{ url_for('routes_bp.home') }}">
            <img src="{{ url_for('static', filename='img/logo.png') }}"
                 class="logo-dashboard"
                 onerror="this.style.display='none'">
        </a>
        <span style="font-weight:700;font-size:1rem;color:#1565C0;letter-spacing:.5px;">
            Attendance Portal
        </span>
    </div>
</header>

<div class="container-fluid px-3 pt-3">

    <div id="formSection" class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">
            <div class="card shadow-sm" style="border-radius:12px;overflow:hidden;">
                <div class="card-header text-white text-center py-3"
                     style="background:#1565C0;">
                    <h5 class="mb-0 fw-bold">Generate Attendance Report</h5>
                </div>
                <div class="card-body p-4">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Location</label>
                        <select id="selLocation" class="form-select"
                                onchange="loadMonths()">
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Month</label>
                        <select id="selMonth" class="form-select"
                                onchange="loadOrganizations()">
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Organization</label>
                        <select id="selOrganization" class="form-select">
                        </select>
                    </div>

                    <button class="btn w-100 fw-bold text-white"
                            style="background:#1565C0;"
                            onclick="generateReport()">
                        Generate Report
                    </button>

                    <div id="formError"
                         class="alert alert-danger mt-3 py-2 text-center d-none">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="reportSection" style="display:none;">

        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">

            <button class="btn btn-outline-secondary btn-sm fw-semibold"
                    onclick="goBack()">
                ← Back
            </button>

            <span id="reportTitle" class="fw-bold text-dark"
                  style="font-size:1rem;"></span>

            <div class="d-flex gap-2">

                <button class="btn btn-success btn-sm fw-semibold"
                        onclick="downloadExcel()" id="btnDownloadExcel">
                    ⬇ Download Excel
                </button>

                <button class="btn btn-secondary btn-sm fw-semibold"
                        onclick="printReport()">
                    🖨 Print
                </button>
            </div>

        </div>

        <div id="reportContainer" class="report-container"></div>
    </div>

</div>

<div id="loadingOverlay" class="loading-overlay" style="display:none;">
    <div class="spinner-border text-primary" role="status"
         style="width:3rem;height:3rem;"></div>
    <p class="mt-3 fw-semibold text-secondary">Please wait...</p>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
